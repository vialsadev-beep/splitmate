name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Typecheck + Unit tests (sin DB) ─────────────────────────
  check:
    name: Typecheck & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Unit tests
        run: pnpm turbo run test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/splitmate_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-for-unit-tests-only-not-production
          JWT_ACCESS_EXPIRES: 15m
          JWT_REFRESH_EXPIRES: 7d
          NODE_ENV: test
          PORT: 3000
          CORS_ORIGIN: http://localhost:5173
          FRONTEND_URL: http://localhost:5173
          RATE_LIMIT_WINDOW_MS: 900000
          RATE_LIMIT_MAX: 100
          AUTH_RATE_LIMIT_MAX: 10
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          GOOGLE_CALLBACK_URL: http://localhost:3000/api/v1/auth/google/callback

  # ─── Integration tests (con PostgreSQL + Redis reales) ────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: check

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: splitmate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @splitmate/api prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/splitmate_test

      - name: Run migrations
        run: pnpm --filter @splitmate/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/splitmate_test

      - name: Seed test data
        run: pnpm --filter @splitmate/api prisma:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/splitmate_test
          NODE_ENV: test

      - name: Run integration tests
        run: pnpm --filter @splitmate/api run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/splitmate_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-integration-secret-for-tests-only-not-production
          JWT_ACCESS_EXPIRES: 15m
          JWT_REFRESH_EXPIRES: 7d
          NODE_ENV: test
          PORT: 3001
          CORS_ORIGIN: http://localhost:5173
          FRONTEND_URL: http://localhost:5173
          RATE_LIMIT_WINDOW_MS: 900000
          RATE_LIMIT_MAX: 1000
          AUTH_RATE_LIMIT_MAX: 100
