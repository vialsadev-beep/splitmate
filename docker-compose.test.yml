version: '3.9'

services:
  postgres_test:
    image: postgres:15-alpine
    container_name: splitmate_postgres_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: splitmate_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data

  redis_test:
    image: redis:7-alpine
    container_name: splitmate_redis_test
    ports:
      - '6380:6379'
    tmpfs:
      - /data
